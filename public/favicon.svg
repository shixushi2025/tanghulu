<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Stick -->
  <line x1="16" y1="3" x2="16" y2="30" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom fruit -->
  <circle cx="16" cy="25" r="5.5" fill="#dc2626"/>
  <circle cx="16" cy="25" r="5.5" fill="none" stroke="#b91c1c" stroke-width="0.5"/>
  <!-- Shine -->
  <circle cx="14" cy="23" r="1.5" fill="white" opacity="0.3"/>

  <!-- Middle fruit -->
  <circle cx="16" cy="15" r="5.5" fill="#ea580c"/>
  <circle cx="16" cy="15" r="5.5" fill="none" stroke="#c2410c" stroke-width="0.5"/>
  <circle cx="14" cy="13" r="1.5" fill="white" opacity="0.3"/>

  <!-- Top fruit -->
  <circle cx="16" cy="5.5" r="4.5" fill="#f97316"/>
  <circle cx="16" cy="5.5" r="4.5" fill="none" stroke="#ea580c" stroke-width="0.5"/>
  <circle cx="14.5" cy="4" r="1.2" fill="white" opacity="0.3"/>
</svg>
